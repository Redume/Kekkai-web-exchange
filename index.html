<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Kekkai</title>
        <meta name="author" content="Redume">
        <meta name="description" content="API providing historical currency data">
        <link rel="icon" type="image/avif" href="./assets/logo.avif"/>

        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body {
                color: white;
                background: #4F5574;
                font: medium "Gotham Pro", sans-serif;
            }

            #convert, #convert-graph {
                display: flex;
                justify-content: center;
            }

            #convert {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
                margin-top: 5%;
            }

            .converter-inputs {
                display: flex;
                align-items: center;
                gap: 10px; 
            }

            #convert-graph {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 50%;
            }

            #convert-graph img {
                margin-top: 20px;
                max-width: 50%;
                height: auto;
            }

            input[type=number] {
                -moz-appearance: textfield;
            }

            input::-webkit-outer-spin-button,
                input::-webkit-inner-spin-button {
                -webkit-appearance: none;
                margin: 0;
            }
        </style>
    </head>
    <body>
        <div id="convert">
            <div id="converter-inputs">
                <input value="1" type="number" min="1" id="currency_amount">
                <select id="currency_from"></select>
                <a>=</a>
                <a id="conv_amount"></a>
                <select id="currency_conv"></select>
            </div>
                <div id="convert-graph">
                    <button id="convert-graph-button">Показать график</button>
                </div>
            </div>
            <script>
                const api_url = localStorage.getItem("api_url")
                const backend_chart = localStorage.getItem("backend_chart") 
                if (!api_url) localStorage.setItem("api_url", "https://kekkai.redume.su");
                if (!backend_chart) localStorage.setItem("backend_chart", "matplotlib");
            
                const button_graph = document.getElementById('convert-graph-button');
                const currency_from_list = document.getElementById("currency_from");
                const currency_conv_list = document.getElementById("currency_conv");
                const amount_text = document.getElementById("currency_amount");
                const conv_amount_display = document.getElementById("conv_amount");
            
                let abortController;
            
                function truncate_number(value, decimals) {
                    const valueStr = value.toString();
                    const dotIndex = valueStr.indexOf('.');
                    if (dotIndex === -1) return valueStr;
                    const desiredLength = dotIndex + decimals + 1;
                    let truncated = valueStr.slice(0, desiredLength);
                    if (parseFloat(truncated) === 0 && value > 0) return valueStr;
                    return truncated;
                }
            
                function updateDisabledOptions() {
                    const fromValue = currency_from_list.value;
                    const convValue = currency_conv_list.value;
                    Array.from(currency_conv_list.options).forEach(opt => opt.disabled = (opt.value === fromValue));
                    Array.from(currency_from_list.options).forEach(opt => opt.disabled = (opt.value === convValue));
                }
            
                function renderOptions(list) {
                    const currentFrom = localStorage.getItem("last_from") || 'USD';
                    const currentConv = localStorage.getItem("last_conv") || 'RUB';
                    
                    currency_from_list.innerHTML = '';
                    currency_conv_list.innerHTML = '';
                    
                    list.forEach(item => {
                        currency_from_list.add(new Option(item, item));
                        currency_conv_list.add(new Option(item, item));
                    });
            
                    currency_from_list.value = list.includes(currentFrom) ? currentFrom : list[0];
                    currency_conv_list.value = list.includes(currentConv) ? currentConv : list[1];
                }
            
                async function convert() {
                    const from_currency = currency_from_list.value;
                    const conv_currency = currency_conv_list.value;
                    const amount_value = amount_text.value;
                    const date = new Date();
            
                    if (abortController) abortController.abort();
                    abortController = new AbortController();
                    
                    if (!amount_value || amount_value <= 0) return;
            
                    let attempts = 0;
                    const max_attempts = 7;
                    let success = false;
            
                    updateDisabledOptions();
                    localStorage.setItem("last_from", from_currency);
                    localStorage.setItem("last_conv", conv_currency);
            
                    while (!success && attempts < max_attempts) {
                        const date_string = date.toISOString().substring(0, 10);
                        try {
                            const params = new URLSearchParams({
                                "conv_amount": amount_value,
                                "from_currency": from_currency,
                                "conv_currency": conv_currency,
                                "date": date_string,
                            });
                            const resp = await fetch(`${api_url}/api/getRate/?${params.toString()}`, {
                                signal: abortController.signal,
                            });
                            if (resp.ok) {
                                const result = await resp.json();
                                conv_amount_display.textContent = truncate_number(result['conv_amount'], 4);
                                button_graph.disabled = false;
                                success = true;
                            } else if (resp.status === 400) {
                                date.setDate(date.getDate() - 1);
                                attempts++;
                            } else {
                                break;
                            }
                        } catch (err) {
                            if (err.name === 'AbortError') return;
                            break;
                        }
                    }
                    
                    if (!success) { 
                        conv_amount_display.textContent = '?';
                        button_graph.disabled = true;
                    }
                }
            
                async function getCurrency() {
                    const cached = localStorage.getItem("currency_list");
                    if (cached) {
                        renderOptions(JSON.parse(cached));
                        button_graph.disabled = false;
                    }
            
                    try {
                        const resp = await fetch(`${api_url}/api/metadata`);
                        if (!resp.ok) throw new Error();
                        const result = await resp.json();
                        const list = [...(result.currencies?.crypto || []), ...(result.currencies?.fiat || [])];
                        
                        if (list.length > 0) {
                            localStorage.setItem("currency_list", JSON.stringify(list));
                            renderOptions(list);
                            button_graph.disabled = false;
                        }
                    } catch (err) {
                        if (!cached) button_graph.disabled = true;
                    }
                }
            
                button_graph.addEventListener('click', function() {
                    const from_currency = currency_from_list.value;
                    const conv_currency = currency_conv_list.value;
                    const params = new URLSearchParams({
                        "from_currency": from_currency,
                        "conv_currency": conv_currency,
                        "period": 'month',
                        "backend": backend_chart
                    });
                    
                    const container = document.getElementById('convert-graph');
                    const oldImg = container.querySelector('img');
                    if (oldImg) oldImg.remove();
            
                    const img = document.createElement('img');
                    img.src = `${api_url}/api/getChart/?${params.toString()}`;
                    img.style.maxWidth = "100%";
                    img.style.marginTop = "20px";
                    container.appendChild(img);
                });
            
                amount_text.addEventListener('input', convert);
                currency_conv_list.addEventListener('change', convert);
                currency_from_list.addEventListener('change', convert);
            
                document.addEventListener('DOMContentLoaded', async () => {
                    await getCurrency();
                    await convert();
                });
            </script>
    </body>
</html>
