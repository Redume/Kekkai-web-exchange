<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Kekkai</title>
        <meta name="author" content="Redume">
        <meta name="description" content="API providing historical currency data">
        <link rel="icon" type="image/avif" href="./assets/logo.avif"/>

        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body {
                color: white;
                background: #4F5574;
                font: medium "Gotham Pro", sans-serif;
            }

            #convert, #convert-graph {
                display: flex;
                justify-content: center;
            }

            #convert {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
                margin-top: 5%;
            }

            .converter-inputs {
                display: flex;
                align-items: center;
                gap: 10px; 
            }

            #convert-graph {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 50%;
            }

            #convert-graph img {
                margin-top: 20px;
                max-width: 50%;
                height: auto;
            }

            input[type=number] {
                -moz-appearance: textfield;
            }

            input::-webkit-outer-spin-button,
                input::-webkit-inner-spin-button {
                -webkit-appearance: none;
                margin: 0;
            }

            #history-section {
                max-width: 500px;
                margin: 30px auto 0;
                padding: 0 16px;
            }

            #history-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 12px;
            }

            #history-header h3 {
                margin: 0;
                font-size: 14px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
                opacity: 0.7;
            }

            #clear-history {
                background: none;
                border: 1px solid rgba(255,255,255,0.2);
                color: rgba(255,255,255,0.5);
                font-size: 12px;
                padding: 4px 10px;
                border-radius: 4px;
                cursor: pointer;
                transition: all 0.2s;
            }

            #clear-history:hover {
                border-color: rgba(255,255,255,0.5);
                color: rgba(255,255,255,0.8);
            }

            #history-list {
                list-style: none;
                padding: 0;
                margin: 0;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            #history-list li {
                background: rgba(255,255,255,0.07);
                border-radius: 6px;
                padding: 10px 14px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
                animation: fadeIn 0.2s ease;
            }

            #history-list li .hist-conversion {
                flex: 1;
            }

            #history-list li .hist-time {
                font-size: 11px;
                opacity: 0.4;
                margin-left: 12px;
                white-space: nowrap;
            }

            #history-list:empty + #history-empty,
            #history-empty {
                display: none;
            }

            #history-list:empty ~ #history-empty {
                display: block;
            }

            .history-empty-msg {
                text-align: center;
                opacity: 0.35;
                font-size: 13px;
                margin-top: 16px;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(-4px); }
                to { opacity: 1; transform: translateY(0); }
            }

            /* Settings button */
            #settings-btn {
                position: fixed;
                top: 16px;
                right: 16px;
                background: rgba(255,255,255,0.1);
                border: 1px solid rgba(255,255,255,0.15);
                color: white;
                width: 38px;
                height: 38px;
                border-radius: 8px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
                z-index: 100;
            }

            #settings-btn:hover {
                background: rgba(255,255,255,0.18);
                border-color: rgba(255,255,255,0.3);
            }

            #settings-btn svg {
                width: 20px;
                height: 20px;
                transition: transform 0.3s ease;
            }

            #settings-btn:hover svg {
                transform: rotate(45deg);
            }

            #settings-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.45);
                z-index: 200;
                animation: overlayIn 0.2s ease;
            }

            #settings-overlay.visible { display: flex; align-items: center; justify-content: center; }

            @keyframes overlayIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }

            #settings-modal {
                background: #3b3f57;
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 12px;
                padding: 28px 28px 20px;
                width: 360px;
                max-width: 90vw;
                box-shadow: 0 20px 60px rgba(0,0,0,0.35);
                animation: modalIn 0.25s ease;
            }

            @keyframes modalIn {
                from { opacity: 0; transform: translateY(12px) scale(0.97); }
                to { opacity: 1; transform: translateY(0) scale(1); }
            }

            #settings-modal h2 {
                margin: 0 0 20px;
                font-size: 16px;
                font-weight: 600;
                letter-spacing: 0.5px;
            }

            .settings-field {
                margin-bottom: 16px;
            }

            .settings-field label {
                display: block;
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 0.8px;
                opacity: 0.55;
                margin-bottom: 6px;
            }

            .settings-field input[type="text"],
            .settings-field select {
                width: 100%;
                box-sizing: border-box;
                padding: 9px 12px;
                background: rgba(255,255,255,0.08);
                border: 1px solid rgba(255,255,255,0.12);
                border-radius: 6px;
                color: white;
                font-size: 14px;
                font-family: inherit;
                outline: none;
                transition: border-color 0.2s;
            }

            .settings-field input[type="text"]:focus,
            .settings-field select:focus {
                border-color: rgba(255,255,255,0.35);
            }

            .settings-field select option {
                background: #3b3f57;
                color: white;
            }

            .settings-actions {
                display: flex;
                justify-content: flex-end;
                gap: 8px;
                margin-top: 22px;
            }

            .settings-actions button {
                padding: 8px 18px;
                border-radius: 6px;
                font-size: 13px;
                font-family: inherit;
                cursor: pointer;
                transition: all 0.2s;
                border: none;
            }

            #settings-cancel {
                background: rgba(255,255,255,0.08);
                color: rgba(255,255,255,0.6);
                border: 1px solid rgba(255,255,255,0.1);
            }

            #settings-cancel:hover {
                background: rgba(255,255,255,0.12);
                color: rgba(255,255,255,0.8);
            }

            #settings-save {
                background: rgba(255,255,255,0.15);
                color: white;
                font-weight: 600;
            }

            #settings-save:hover {
                background: rgba(255,255,255,0.25);
            }
        </style>
    </head>
    <body>
        <button id="settings-btn" title="Настройки">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </button>

        <div id="settings-overlay">
            <div id="settings-modal">
                <h2>Настройки</h2>
                <div class="settings-field">
                    <label>Инстанс Kekkai</label>
                    <input type="text" id="settings-api-url" placeholder="https://kekkai.redume.su">
                </div>
                <div class="settings-field">
                    <label>Бэкенд графиков</label>
                    <select id="settings-chart-backend">
                        <option value="matplotlib">matplotlib</option>
                        <option value="typst">typst</option>
                    </select>
                </div>
                <div class="settings-actions">
                    <button id="settings-cancel">Отмена</button>
                    <button id="settings-save">Сохранить</button>
                </div>
            </div>
        </div>

        <div id="convert">
            <div id="converter-inputs">
                <input value="1" type="number" min="1" id="currency_amount">
                <select id="currency_from"></select>
                <a>=</a>
                <a id="conv_amount"></a>
                <select id="currency_conv"></select>
            </div>
                <div id="convert-graph">
                    <button id="convert-graph-button">Показать график</button>
                </div>
            </div>

            <div id="history-section">
                <div id="history-header">
                    <h3>История конвертаций</h3>
                    <button id="clear-history">Очистить</button>
                </div>
                <ul id="history-list"></ul>
                <p class="history-empty-msg" id="history-empty">Пока нет конвертаций</p>
            </div>

            <script>
                const api_url = localStorage.getItem("api_url")
                const backend_chart = localStorage.getItem("backend_chart") 
                if (!api_url) localStorage.setItem("api_url", "https://kekkai.redume.su");
                if (!backend_chart) localStorage.setItem("backend_chart", "matplotlib");
            
                const button_graph = document.getElementById('convert-graph-button');
                const currency_from_list = document.getElementById("currency_from");
                const currency_conv_list = document.getElementById("currency_conv");
                const amount_text = document.getElementById("currency_amount");
                const conv_amount_display = document.getElementById("conv_amount");
                const history_list = document.getElementById("history-list");
                const clear_history_btn = document.getElementById("clear-history");
                const history_empty = document.getElementById("history-empty");
                const settings_btn = document.getElementById("settings-btn");
                const settings_overlay = document.getElementById("settings-overlay");
                const settings_api_input = document.getElementById("settings-api-url");
                const settings_backend_select = document.getElementById("settings-chart-backend");
                const settings_save_btn = document.getElementById("settings-save");
                const settings_cancel_btn = document.getElementById("settings-cancel");

                const cache_time = 2 * 60 * 60 * 1000; //2h
                const MAX_HISTORY = 20;
                let abortController;
                let lastRecordedKey = null;

                function truncate_number(value, decimals) {
                    const valueStr = value.toString();
                    const dotIndex = valueStr.indexOf('.');
                    if (dotIndex === -1) return valueStr;
                    const desiredLength = dotIndex + decimals + 1;
                    let truncated = valueStr.slice(0, desiredLength);
                    if (parseFloat(truncated) === 0 && value > 0) return valueStr;
                    return truncated;
                }

                function updateDisabledOptions() {
                    const fromValue = currency_from_list.value;
                    const convValue = currency_conv_list.value;
                    Array.from(currency_conv_list.options).forEach(opt => opt.disabled = (opt.value === fromValue));
                    Array.from(currency_from_list.options).forEach(opt => opt.disabled = (opt.value === convValue));
                }

                function renderOptions(list) {
                    const currentFrom = localStorage.getItem("last_from") || 'USD';
                    const currentConv = localStorage.getItem("last_conv") || 'RUB';
                    currency_from_list.innerHTML = '';
                    currency_conv_list.innerHTML = '';
                    list.forEach(item => {
                        currency_from_list.add(new Option(item, item));
                        currency_conv_list.add(new Option(item, item));
                    });
                    currency_from_list.value = list.includes(currentFrom) ? currentFrom : list[0];
                    currency_conv_list.value = list.includes(currentConv) ? currentConv : list[1];
                }

                function getHistory() {
                    try {
                        return JSON.parse(localStorage.getItem("conversion_history") || "[]");
                    } catch { return []; }
                }

                function saveHistory(history) {
                    localStorage.setItem("conversion_history", JSON.stringify(history));
                }

                function formatTime(ts) {
                    const d = new Date(ts);
                    const pad = n => String(n).padStart(2, '0');
                    return `${pad(d.getDate())}.${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
                }

                function renderHistory() {
                    const history = getHistory();
                    history_list.innerHTML = '';
                    history_empty.style.display = history.length === 0 ? 'block' : 'none';

                    history.forEach(entry => {
                        const li = document.createElement('li');
                        li.innerHTML = `
                            <span class="hist-conversion">${entry.amount} ${entry.from} = ${entry.result} ${entry.to}</span>
                            <span class="hist-time">${formatTime(entry.timestamp)}</span>
                        `;
                        history_list.appendChild(li);
                    });
                }

                function addToHistory(amount, from, result, to) {
                    const key = `${amount}-${from}-${to}`;
                    if (key === lastRecordedKey) return;
                    lastRecordedKey = key;

                    const history = getHistory();
                    history.unshift({
                        amount, from, result, to,
                        timestamp: Date.now()
                    });

                    if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
                    saveHistory(history);
                    renderHistory();
                }

                clear_history_btn.addEventListener('click', () => {
                    localStorage.removeItem("conversion_history");
                    lastRecordedKey = null;
                    renderHistory();
                });

                function openSettings() {
                    settings_api_input.value = localStorage.getItem("api_url") || "https://kekkai.redume.su";
                    settings_backend_select.value = localStorage.getItem("backend_chart") || "matplotlib";
                    settings_overlay.classList.add("visible");
                }

                function closeSettings() {
                    settings_overlay.classList.remove("visible");
                }

                settings_btn.addEventListener('click', openSettings);
                settings_cancel_btn.addEventListener('click', closeSettings);
                settings_overlay.addEventListener('click', (e) => {
                    if (e.target === settings_overlay) closeSettings();
                });

                settings_save_btn.addEventListener('click', () => {
                    let url = settings_api_input.value.trim();
                    if (url.endsWith('/')) url = url.slice(0, -1);
                    if (url) localStorage.setItem("api_url", url);

                    localStorage.setItem("backend_chart", settings_backend_select.value);
                    closeSettings();
                    location.reload();
                });

                async function convert() {
                    const from_currency = currency_from_list.value;
                    const conv_currency = currency_conv_list.value;
                    const amount_value = amount_text.value;
                    const now = Date.now();

                    if (abortController) abortController.abort();
                    abortController = new AbortController();
                    
                    if (!amount_value || amount_value <= 0) return;

                    updateDisabledOptions();
                    localStorage.setItem("last_from", from_currency);
                    localStorage.setItem("last_conv", conv_currency);

                    const cacheKey = `${from_currency}-${conv_currency}-${amount_value}`;
                    const cachedData = JSON.parse(localStorage.getItem("conversion_cache") || "{}");

                    if (cachedData[cacheKey] && (now - cachedData[cacheKey].timestamp < cache_time)) {
                        conv_amount_display.textContent = cachedData[cacheKey].result;
                        addToHistory(amount_value, from_currency, cachedData[cacheKey].result, conv_currency);
                        button_graph.disabled = false;
                        return;
                    }

                    let attempts = 0;
                    const max_attempts = 7;
                    let success = false;
                    let date = new Date();

                    while (!success && attempts < max_attempts) {
                        const date_string = date.toISOString().substring(0, 10);
                        try {
                            const params = new URLSearchParams({
                                "conv_amount": amount_value,
                                "from_currency": from_currency,
                                "conv_currency": conv_currency,
                                "date": date_string,
                            });
                            const resp = await fetch(`${api_url}/api/getRate/?${params.toString()}`, {
                                signal: abortController.signal,
                            });
                            if (resp.ok) {
                                const result = await resp.json();
                                const finalValue = truncate_number(result['conv_amount'], 4);
                                conv_amount_display.textContent = finalValue;
                                
                                const newCache = JSON.parse(localStorage.getItem("conversion_cache") || "{}");
                                newCache[cacheKey] = { result: finalValue, timestamp: now };
                                localStorage.setItem("conversion_cache", JSON.stringify(newCache));

                                addToHistory(amount_value, from_currency, finalValue, conv_currency);
                                
                                button_graph.disabled = false;
                                success = true;
                            } else if (resp.status === 400) {
                                date.setDate(date.getDate() - 1);
                                attempts++;
                            } else {
                                break;
                            }
                        } catch (err) {
                            if (err.name === 'AbortError') return;
                            break;
                        }
                    }
                    if (!success) { 
                        conv_amount_display.textContent = '?';
                        button_graph.disabled = true;
                    }
                }

                async function getCurrency() {
                    const cached = localStorage.getItem("currency_list");
                    const lastUpdate = localStorage.getItem("currency_last_update");
                    const now = Date.now();

                    if (cached) {
                        renderOptions(JSON.parse(cached));
                        button_graph.disabled = false;
                        if (lastUpdate && (now - lastUpdate < cache_time)) return;
                    }

                    try {
                        const resp = await fetch(`${api_url}/api/metadata`);
                        if (!resp.ok) throw new Error();
                        const result = await resp.json();
                        const list = [...(result.currencies?.crypto || []), ...(result.currencies?.fiat || [])];
                        
                        if (list.length > 0) {
                            localStorage.setItem("currency_list", JSON.stringify(list));
                            localStorage.setItem("currency_last_update", now.toString());
                            renderOptions(list);
                            button_graph.disabled = false;
                        }
                    } catch (err) {
                        if (!cached) button_graph.disabled = true;
                    }
                }

                button_graph.addEventListener('click', function() {
                    const from_currency = currency_from_list.value;
                    const conv_currency = currency_conv_list.value;
                    const params = new URLSearchParams({
                        "from_currency": from_currency,
                        "conv_currency": conv_currency,
                        "period": 'month',
                        "backend": backend_chart
                    });
                    const container = document.getElementById('convert-graph');
                    const oldImg = container.querySelector('img');
                    if (oldImg) oldImg.remove();
                    const img = document.createElement('img');
                    img.src = `${api_url}/api/getChart/?${params.toString()}`;
                    container.appendChild(img);
                });
                amount_text.addEventListener('input', convert);
                currency_conv_list.addEventListener('change', convert);
                currency_from_list.addEventListener('change', convert);
                document.addEventListener('DOMContentLoaded', async () => {
                    renderHistory();
                    await getCurrency();
                    await convert();
                });
            </script>
    </body>
</html>
